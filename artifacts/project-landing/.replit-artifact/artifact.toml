kind = "web"
previewPath = "/"
title = "Final Year Projects Landing Page"
version = "1.0.0"
id = "artifacts/project-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18661

[services.development]
run = "pnpm --filter @workspace/project-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-landing", "run", "build" ]
publicDir = "artifacts/project-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18661"
BASE_PATH = "/"
